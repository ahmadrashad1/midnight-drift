<!DOCTYPE html>

<html class="h-full" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>TOUGE_UNDERGROUND | Midnight Override</title>
  <!-- BEGIN: External Resources -->
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=JetBrains+Mono&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- END: External Resources -->
  <!-- BEGIN: Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neonPink: '#ff007f',
            toxicGreen: '#D7FFC5',
            midnightBlack: '#0a0a0a',
          },
          fontFamily: {
            space: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          animation: {
            'glitch': 'glitch 1s infinite linear alternate-reverse',
            'flicker': 'flicker 2s infinite',
            'scanline': 'scanline 10s linear infinite',
            'slow-zoom': 'slowZoom 20s ease-in-out infinite alternate',
            'engine-shake': 'engineShake 0.1s infinite',
          },
          keyframes: {
            glitch: {
              '0%': { transform: 'translate(0)' },
              '20%': { transform: 'translate(-2px, 2px)' },
              '40%': { transform: 'translate(-2px, -2px)' },
              '60%': { transform: 'translate(2px, 2px)' },
              '80%': { transform: 'translate(2px, -2px)' },
              '100%': { transform: 'translate(0)' },
            },
            flicker: {
              '0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100%': { opacity: 1, textShadow: '0 0 10px #ff007f' },
              '20%, 21.999%, 63%, 63.999%, 65%, 69.999%': { opacity: 0.4, textShadow: 'none' },
            },
            scanline: {
              '0%': { transform: 'translateY(0)' },
              '100%': { transform: 'translateY(100vh)' },
            },
            slowZoom: {
              '0%': { transform: 'scale(1)' },
              '100%': { transform: 'scale(1.1)' },
            },
            engineShake: {
              '0%, 100%': { transform: 'translate(0, 0)' },
              '25%': { transform: 'translate(1px, -1px)' },
              '50%': { transform: 'translate(-1px, 1px)' },
              '75%': { transform: 'translate(1px, 1px)' },
            }
          }
        }
      }
    }
  </script>
  <!-- END: Tailwind Configuration -->
  <!-- BEGIN: Custom Styling -->
  <style data-purpose="overlays">
    .scanline-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255, 0, 127, 0.1);
      z-index: 40;
      pointer-events: none;
    }

    .static-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.05;
      pointer-events: none;
      z-index: 50;
    }

    .rain-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      pointer-events: none;
    }

    .glitch-text:hover {
      animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
      text-shadow: 2px 0 #ff007f, -2px 0 #D7FFC5;
    }

    .industrial-border {
      border: 1px solid rgba(255, 0, 127, 0.3);
      position: relative;
    }

    .industrial-border::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      width: 10px;
      height: 10px;
      border-top: 2px solid #ff007f;
      border-left: 2px solid #ff007f;
    }

    .industrial-border::after {
      content: '';
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      border-bottom: 2px solid #ff007f;
      border-right: 2px solid #ff007f;
    }

    /* Burnout Smoke Effects */
    .smoke-particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      filter: blur(20px);
      pointer-events: none;
      z-index: 21;
    }
  </style>
  <style data-purpose="button-glow">
    .btn-neon-glow {
      box-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
      transition: all 0.3s ease;
    }

    .btn-neon-glow:hover {
      box-shadow: 0 0 30px rgba(255, 0, 127, 1), 0 0 60px rgba(255, 0, 127, 0.4);
      transform: translateY(-2px);
    }

    .header-glow {
      text-shadow: 0 0 10px rgba(255, 0, 127, 0.8), 0 0 20px rgba(255, 0, 127, 0.4);
    }
  </style>
  <!-- END: Custom Styling -->
</head>

<body class="bg-midnightBlack text-white font-space overflow-x-hidden selection:bg-neonPink selection:text-white">

  <div class="scanline-overlay animate-scanline"></div>
  <!-- END: Screen Overlays -->
  <!-- BEGIN: Hero Section -->

      <video autoplay="" class="w-full h-full object-cover grayscale-[0.4] transition-all duration-[3000ms]"
        id="bg-video" loop="" muted="" playsinline=""
        poster="https://lh3.googleusercontent.com/aida-public/AB6AXuCUR1V_habdFjjGzfYyxLLoSDNHR7-Mgk4CxhFILDJt391GGOixHd3JOJqlxE4hefcei3PbfQA5lPXE02uujK3QASUVejo7Ym52R7x1ev8Oya28LZVgTryKy5-vqX8wxWUPh9G47NWWuG-pQj_pETUH6Jizp8VhH3i1fmqoEMjNX9Q0I4D6As27jgMbSyNrItAFm71wLPNILuu8mKE7APqRT9GeqVm_wDjAy2BRxgxFpvwKqj7PiSfrLZYnDW1G2HQHU_y9jgOo2BsH">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-car-drifting-at-night-on-a-wet-road-4301-large.mp4"
          type="video/mp4" />
      </video>
      <!-- Red Light/Taillight Glow Overlay (Animated via JS) -->
      <div

      <!-- Dark Overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-midnightBlack via-midnightBlack/40 to-midnightBlack/80 z-10">
      </div>
    </div>
    <!-- Rain Animation Layer -->
    <canvas class="rain-canvas" data-purpose="rain-animation" id="rainCanvas"></canvas>
    <!-- Smoke Container (JS populated) -->
    <div class="absolute inset-0 pointer-events-none z-[21]" id="smoke-container"></div>
    <!-- BEGIN: Navigation -->
    <header class="relative z-50 px-6 py-6 md:px-12 flex justify-between items-center" data-purpose="main-nav">
      <div class="flex items-center gap-2">
        <span
          class="text-2xl font-bold italic tracking-tighter text-neonPink animate-flicker header-glow">TOUGE_UNDERGROUND</span>
      </div>
      <div class="flex items-center gap-4">
        <!-- Audio Control -->
        <button
          class="p-2 border border-toxicGreen/30 text-toxicGreen hover:bg-toxicGreen/10 transition-colors flex items-center justify-center rounded-sm"
          id="audio-toggle">
          <span class="material-symbols-outlined text-2xl">volume_off</span>
        </button>
        <button
          class="hidden md:block px-6 py-2 border border-neonPink text-neonPink font-mono text-sm tracking-widest hover:bg-neonPink hover:text-white transition-colors uppercase btn-neon-glow">
          JOIN THE CREW
        </button>
        <!-- Hamburger Menu -->
        <button aria-label="Menu" class="group flex flex-col gap-1.5 p-2">
          <div class="w-8 h-0.5 bg-toxicGreen group-hover:bg-neonPink transition-colors"></div>
          <div class="w-8 h-0.5 bg-toxicGreen group-hover:bg-neonPink transition-colors translate-x-1"></div>
          <div class="w-5 h-0.5 bg-toxicGreen group-hover:bg-neonPink transition-colors"></div>
        </button>
      </div>
    </header>
    <!-- END: Navigation -->
    <!-- BEGIN: Hero Content -->
    <main class="relative z-30 flex-grow flex flex-col justify-center items-center text-center px-4"
      data-purpose="hero-main-content">
      <div class="max-w-5xl space-y-8">
        <!-- Headline -->
        <h1 class="text-6xl md:text-9xl font-black italic tracking-tighter uppercase leading-none drop-shadow-2xl"
          data-purpose="main-headline">
          <span class="block text-white opacity-95">MIDNIGHT</span>
          <span
            class="block text-neonPink animate-flicker drop-shadow-[0_0_20px_rgba(255,0,127,0.8)] header-glow">OVERRIDE</span>
        </h1>
        <!-- Subheadline -->
        <div class="flex justify-center">
          <p class="max-w-2xl font-mono text-toxicGreen text-xs md:text-base tracking-[0.2em] border-y border-toxicGreen/20 py-4 uppercase bg-midnightBlack/40 backdrop-blur-sm"
            data-purpose="subheadline">
            WHERE RUBBER MEETS REBELLION. JOIN THE GLOBAL TOUGE NETWORK.
          </p>
        </div>
        <!-- Call to Action -->
        <div class="pt-8 flex flex-col sm:flex-row gap-6 justify-center items-center">
          <button
            class="group relative px-12 py-5 bg-neonPink text-white font-black italic text-xl tracking-widest uppercase btn-neon-glow glitch-text industrial-border"
            id="cta-button">
            ENTER THE DRIFT
          </button>
          <div
            class="font-mono text-[10px] text-gray-400 flex items-center gap-4 uppercase tracking-widest bg-midnightBlack/60 px-4 py-1 rounded-full">
            <span class="text-toxicGreen" id="status-light">● ONLINE</span>
            <span id="active-count">4,281 DRIFTERS ACTIVE</span>
          </div>
        </div>
      </div>
    </main>
    <!-- END: Hero Content -->
    <!-- BEGIN: Section Footer Decoration -->
    <div class="relative z-30 px-6 py-8 flex justify-between items-end" data-purpose="hero-footer">
      <div class="hidden md:block border-l-2 border-toxicGreen pl-4 py-2">
        <p class="text-[10px] font-mono text-toxicGreen/60 tracking-widest" id="system-status">SYSTEM_STATUS: COLD_START
        </p>
        <p class="text-[10px] font-mono text-toxicGreen/60 tracking-widest">LOC: Pindi_DISTRICT_03</p>
      </div>
      <div class="flex flex-col items-end gap-2">
        <div class="w-32 h-1 bg-gradient-to-r from-transparent via-neonPink to-transparent opacity-50"></div>
        <span class="text-[10px] font-mono text-neonPink/70 tracking-tighter uppercase">Est. 1996 // DRIFT_OR_DIE</span>
      </div>
    </div>
    <!-- END: Section Footer Decoration -->
  </section>
  <!-- END: Hero Section -->
  <!-- Audio Sources (Muted by default due to browser policy) -->
  <audio id="audio-engine-start" preload="auto"
    src="https://assets.mixkit.co/sfx/preview/mixkit-sports-car-engine-start-1536.mp3"></audio>
  <audio id="audio-screech" preload="auto"
    src="https://assets.mixkit.co/sfx/preview/mixkit-car-tire-screech-732.mp3"></audio>
  <audio id="audio-limiter" loop="" preload="auto"
    src="https://assets.mixkit.co/sfx/preview/mixkit-racing-car-engine-loop-1582.mp3"></audio>
  <!-- BEGIN: Scripts -->
  <script data-purpose="rain-animation">
    const canvas = document.getElementById('rainCanvas');
    const ctx = canvas.getContext('2d');

    let w, h;
    let particles = [];
    const particleCount = 150;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }

    class RainDrop {
      constructor() {
        this.init();
      }

      init() {
        this.x = Math.random() * w;
        this.y = Math.random() * h;
        this.l = Math.random() * 20 + 10;
        this.v = Math.random() * 15 + 10;
        this.color = 'rgba(215, 255, 197, 0.3)';
      }

      draw() {
        ctx.beginPath();
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 1;
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x + (this.v * 0.1), this.y + this.l);
        ctx.stroke();
      }

      update() {
        this.y += this.v;
        this.x += (this.v * 0.1);
        if (this.y > h) {
          this.y = -this.l;
          this.x = Math.random() * w;
        }
        this.draw();
      }
    }

    function initRain() {
      resize();
      for (let i = 0; i < particleCount; i++) {
        particles.push(new RainDrop());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => p.update());
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resize);
    initRain();
    animate();
  </script>
  <script data-purpose="cinematic-sequence">
    const video = document.getElementById('bg-video');
    const taillight = document.getElementById('taillight-glow');
    const smokeContainer = document.getElementById('smoke-container');
    const audioToggle = document.getElementById('audio-toggle');
    const audioIcon = audioToggle.querySelector('span');
    const heroContainer = document.getElementById('hero-main');
    const systemStatusText = document.getElementById('system-status');

    // Audios
    const sndStart = document.getElementById('audio-engine-start');
    const sndScreech = document.getElementById('audio-screech');
    const sndLimiter = document.getElementById('audio-limiter');

    let isAudioEnabled = false;
    let sequenceStarted = false;

    audioToggle.addEventListener('click', () => {
      isAudioEnabled = !isAudioEnabled;
      if (isAudioEnabled) {
        audioIcon.textContent = 'volume_up';
        audioIcon.classList.add('text-neonPink');
        audioToggle.classList.add('border-neonPink');
        if (!sequenceStarted) startCinematicSequence();
      } else {
        audioIcon.textContent = 'volume_off';
        audioIcon.classList.remove('text-neonPink');
        audioToggle.classList.remove('border-neonPink');
        [sndStart, sndScreech, sndLimiter].forEach(a => { a.pause(); a.currentTime = 0; });
      }
    });

    function createSmoke() {
      const smoke = document.createElement('div');
      smoke.className = 'smoke-particle';
      const size = Math.random() * 150 + 100;
      smoke.style.width = `${size}px`;
      smoke.style.height = `${size}px`;
      smoke.style.left = `${Math.random() * 100}%`;
      smoke.style.bottom = `-50px`;
      smoke.style.opacity = '0.6';

      smokeContainer.appendChild(smoke);

      const anim = smoke.animate([
        { transform: 'translateY(0) scale(1) rotate(0deg)', opacity: 0.6 },
        { transform: `translateY(-${Math.random() * 400 + 200}px) scale(2) rotate(${Math.random() * 360}deg)`, opacity: 0 }
      ], {
        duration: Math.random() * 3000 + 2000,
        easing: 'ease-out'
      });

      anim.onfinish = () => smoke.remove();
    }

    let smokeInterval;

    function startCinematicSequence() {
      if (sequenceStarted) return;
      sequenceStarted = true;

      // Stage 1: Cold State (Handled by initial CSS - grayscale 0.4)
      systemStatusText.textContent = "SYSTEM_STATUS: IGNITION_PENDING";

      setTimeout(() => {
        // Stage 2: Engine Startup
        if (isAudioEnabled) sndStart.play();
        heroContainer.classList.add('animate-engine-shake');
        video.classList.remove('grayscale-[0.4]');
        systemStatusText.textContent = "SYSTEM_STATUS: ENGINE_CRANKING";

        setTimeout(() => {
          // Stage 3: Taillights glow
          taillight.style.opacity = '0.4';
          taillight.classList.add('bg-neonPink/40');
          systemStatusText.textContent = "SYSTEM_STATUS: LIGHTS_ACTIVE";

          setTimeout(() => {
            // Stage 4: Tires screech
            if (isAudioEnabled) sndScreech.play();
            systemStatusText.textContent = "SYSTEM_STATUS: TRACTION_LOSS";

            setTimeout(() => {
              // Stage 5: Burnout / Smoke
              smokeInterval = setInterval(createSmoke, 50);
              systemStatusText.textContent = "SYSTEM_STATUS: BURNOUT_MAX";

              setTimeout(() => {
                // Stage 6: Redline / Limiter
                if (isAudioEnabled) sndLimiter.play();
                taillight.style.opacity = '0.8';
                taillight.classList.replace('bg-neonPink/40', 'bg-neonPink/60');
                systemStatusText.textContent = "SYSTEM_STATUS: REDLINE_REACHED";
              }, 1000);
            }, 500);
          }, 1500);
        }, 1000);
      }, 1000);
    }

    // Auto-start visual sequence after a delay if user doesn't click audio (silent mode)
    setTimeout(() => {
      if (!sequenceStarted) {
        // Start visual only if sequence hasn't started
        video.classList.remove('grayscale-[0.4]');
        taillight.style.opacity = '0.3';
        taillight.classList.add('bg-neonPink/30');
        smokeInterval = setInterval(createSmoke, 200); // Slower smoke for background
      }
    }, 5000);
  </script>
  <!-- END: Scripts -->
</body>
